<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alanna 15 Anos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow-x: hidden; font-family: Georgia, serif; }

  .img-section {
    width: 100%;
    display: flex;
    justify-content: center;
    position: relative;
  }
  .img-section img {
    width: 100%;
    max-width: 480px;
    display: block;
  }

  #page5-wrap {
    position: relative;
    display: inline-block;
    max-width: 480px;
    width: 100%;
  }
  #page5-wrap img { width: 100%; display: block; }

  .overlay-btn {
    position: absolute;
    left: 8%;
    right: 8%;
    cursor: pointer;
    z-index: 10;
    border-radius: 14px;
    text-decoration: none;
    display: block;
    /* background: rgba(255,0,0,0.25); */ /* descomente para depurar */
  }

  /* Modal Dicas de Presente */
  #modal-dicas {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal-dicas.open { display: flex; }
  .modal-inner {
    position: relative;
    max-width: 480px;
    width: 95%;
  }
  .modal-inner img { width: 100%; border-radius: 12px; display: block; }
  .btn-fechar {
    position: absolute;
    top: -14px; right: -14px;
    background: #fff;
    border: none;
    border-radius: 50%;
    width: 34px; height: 34px;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    z-index: 10;
  }
  .pix-area { padding: 10px 4px 0; }
  .pix-label { color: rgba(255,255,255,0.55); font-size: 11px; text-align: center; margin-bottom: 6px; }
  .pix-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .pix-key { color: #fff; font-size: 13px; word-break: break-all; flex: 1; }
  .btn-copiar {
    background: #c9a96e; color: #fff; border: none;
    border-radius: 8px; padding: 8px 14px;
    font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit;
  }

  /* Botão música */
  #musicBtn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 150;
    background: rgba(0,0,0,0.55);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 46px; height: 46px;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
  <source src="https://archive.org/download/sylvia-salustti-raphael-rossato-vejo-enfim-a-luz-brilhar-de-enrolados-video-oficial/Sylvia%20Salustti%2C%20Raphael%20Rossato%20-%20Vejo%20Enfim%20a%20Luz%20Brilhar%20%28De%20EnroladosVi%CC%81deo%20Oficial%29.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵</button>

<!-- IMAGENS 1 a 4 -->
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/1.png" alt="Alanna 15 Anos"></div>
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/2.png" alt="Alanna 15 Anos"></div>
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/3.png" alt="Alanna 15 Anos"></div>
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/4.png" alt="Alanna 15 Anos"></div>

<!-- IMAGEM 5 — botões sobrepostos -->
<div class="img-section">
  <div id="page5-wrap">
    <img src="https://archive.org/download/2_20260613_202606/5.png" alt="Alanna 15 Anos">

    <!-- 1. Confirmação de Presença -->
    <a href="https://wa.me/5521987134044?text=Confirmo%20minha%20presen%C3%A7a%20no%20anivers%C3%A1rio%20da%20Alanna!"
       target="_blank" class="overlay-btn" style="top:28%; height:14%;"></a>

    <!-- 2. Dicas de Presente -->
    <a href="#" class="overlay-btn" style="top:47%; height:14%;"
       onclick="abrirDicas(event)"></a>

    <!-- 3. Localização da Festa -->
    <a href="https://www.google.com/maps/search/?api=1&query=Party+House+Lokal+Ideal+Freguesia+Jacarepagua+Rio+de+Janeiro"
       target="_blank" class="overlay-btn" style="top:66%; height:14%;"></a>
  </div>
</div>

<!-- IMAGENS 6 e 7 -->
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/6.png" alt="Alanna 15 Anos"></div>
<div class="img-section"><img src="https://archive.org/download/2_20260613_202606/7.png" alt="Alanna 15 Anos"></div>

<!-- MODAL: Dicas de Presente (imagem 8) -->
<div id="modal-dicas">
  <div class="modal-inner">
    <button class="btn-fechar" onclick="fecharDicas()">✕</button>
    <img src="https://archive.org/download/2_20260613_202606/8.png" alt="Dicas de Presente">
    <div class="pix-area">
      <p class="pix-label">Pix — clique para copiar a chave</p>
      <div class="pix-box">
        <span class="pix-key" id="pixKey">21984285458</span>
        <button class="btn-copiar" onclick="copiarPix()">Copiar</button>
      </div>
    </div>
  </div>
</div>

<script>
  var music = document.getElementById('bgMusic');
  var btn = document.getElementById('musicBtn');
  var playing = false;

  // Toca no primeiro toque/clique na página
  function startMusic() {
    if (!playing) {
      music.play().then(function() {
        playing = true;
        btn.textContent = '🔊';
      }).catch(function(){});
    }
    document.removeEventListener('touchstart', startMusic);
    document.removeEventListener('click', startMusic);
  }

  document.addEventListener('touchstart', startMusic, { once: true });
  document.addEventListener('click', startMusic, { once: true });

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (playing) {
      music.pause();
      playing = false;
      btn.textContent = '🎵';
    } else {
      music.play().then(function() {
        playing = true;
        btn.textContent = '🔊';
      });
    }
  });

  function abrirDicas(e) {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('modal-dicas').classList.add('open');
  }

  function fecharDicas() {
    document.getElementById('modal-dicas').classList.remove('open');
  }

  document.getElementById('modal-dicas').addEventListener('click', function(e) {
    if (e.target === this) fecharDicas();
  });

  function copiarPix() {
    var chave = document.getElementById('pixKey').textContent.trim();
    navigator.clipboard.writeText(chave).then(function() {
      var b = document.querySelector('.btn-copiar');
      b.textContent = 'Copiado! ✓';
      setTimeout(function(){ b.textContent = 'Copiar'; }, 2500);
    });
  }
</script>
</body>
</html>
